<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quiz ao Vivo — Perguntas</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;background:#f2f0f7;color:#222;min-height:100vh}
.wrap{max-width:860px;margin:0 auto;padding:24px 16px 120px}
h1{color:#46178f;margin-bottom:4px}
.sub{color:#666;margin-bottom:18px}
.links{background:#fff;border-radius:12px;padding:14px 18px;margin-bottom:20px;box-shadow:0 1px 4px rgba(0,0,0,.08);font-size:.95rem;line-height:1.7}
.links b{color:#46178f}
.card{background:#fff;border-radius:12px;padding:18px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.card .head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.card .head b{color:#46178f}
.card .head .btns button{border:none;background:#eee;border-radius:6px;padding:6px 10px;margin-left:6px;cursor:pointer;font-size:.9rem}
.card .head .btns button:hover{background:#ddd}
.card .head .btns button.del{background:#fde8e8;color:#c0392b}
textarea{width:100%;padding:10px;border:1px solid #ccc;border-radius:8px;font-size:1rem;font-family:inherit;resize:vertical;min-height:52px}
.optrow{display:flex;align-items:center;gap:10px;margin-top:8px}
.optrow .dot{width:26px;height:26px;border-radius:6px;flex:none;display:flex;align-items:center;justify-content:center;color:#fff;font-size:.8rem}
.optrow input[type=text]{flex:1;padding:9px;border:1px solid #ccc;border-radius:8px;font-size:.95rem}
.optrow label{font-size:.8rem;color:#555;display:flex;align-items:center;gap:4px;white-space:nowrap;cursor:pointer}
.meta{margin-top:10px;font-size:.9rem;color:#555;display:flex;align-items:center;gap:8px}
.meta input{width:70px;padding:7px;border:1px solid #ccc;border-radius:8px}
.footer{position:fixed;bottom:0;left:0;right:0;background:#fff;box-shadow:0 -2px 8px rgba(0,0,0,.12);padding:12px 16px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
button.primary{background:#46178f;color:#fff;border:none;border-radius:10px;padding:13px 28px;font-size:1.05rem;font-weight:700;cursor:pointer}
button.primary:hover{background:#37116f}
button.add{background:#26890c;color:#fff;border:none;border-radius:10px;padding:13px 22px;font-size:1rem;font-weight:600;cursor:pointer}
button.warn{background:#fff;color:#c0392b;border:1px solid #c0392b;border-radius:10px;padding:13px 18px;font-size:.95rem;cursor:pointer}
#status{text-align:center;font-weight:600;padding:8px;border-radius:8px;margin-bottom:14px;display:none}
#status.ok{display:block;background:#e6f7e6;color:#26890c}
#status.err{display:block;background:#fde8e8;color:#c0392b}
</style>
</head>
<body>
<div class="wrap">
  <h1>✏ Perguntas do Quiz</h1>
  <div class="sub">Cadastre as perguntas, marque a alternativa correta e clique em <b>Salvar</b>.</div>
  <div class="links" id="links">Carregando endereços...</div>
  <div id="status"></div>
  <div id="list"></div>
</div>
<div class="footer">
  <button class="add" onclick="addQ()">+ Adicionar pergunta</button>
  <button class="primary" onclick="saveAll()">💾 Salvar todas</button>
  <button class="warn" onclick="resetGame()">🔄 Reiniciar jogo</button>
  <button class="warn" style="color:#46178f;border-color:#46178f" onclick="restoreBackup()">↩ Restaurar backup</button>
</div>
<script>
const COLORS = ['#e21b3c','#1368ce','#d89e00','#26890c'];
const SHAPES = ['▲','◆','●','■'];
let qs = [];

function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function getPin(){
  let pin = localStorage.getItem('quiz_pin') || '';
  if(!pin){
    pin = prompt('PIN do apresentador (padrão: 1234):') || '';
    localStorage.setItem('quiz_pin', pin);
  }
  return pin;
}
function status(msg, ok){
  const el = document.getElementById('status');
  el.textContent = msg; el.className = ok?'ok':'err';
  if(ok) setTimeout(()=>{el.className='';},4000);
  window.scrollTo({top:0,behavior:'smooth'});
}

function collect(){
  // lê os valores atuais dos campos para o array qs
  document.querySelectorAll('.card').forEach((card,i)=>{
    const q = qs[i];
    q.text = card.querySelector('textarea').value;
    q.options = [...card.querySelectorAll('input[type=text]')].map(inp=>inp.value);
    const checked = card.querySelector('input[type=radio]:checked');
    q.correct = checked ? Number(checked.value) : -1;
    q.duration = Number(card.querySelector('.dur').value)||20;
  });
}

function render(){
  document.getElementById('list').innerHTML = qs.map((q,i)=>`
    <div class="card">
      <div class="head"><b>Pergunta ${i+1}</b>
        <span class="btns">
          <button onclick="move(${i},-1)" ${i===0?'disabled':''}>↑</button>
          <button onclick="move(${i},1)" ${i===qs.length-1?'disabled':''}>↓</button>
          <button class="del" onclick="delQ(${i})">Excluir</button>
        </span>
      </div>
      <textarea placeholder="Texto da pergunta">${esc(q.text)}</textarea>
      ${[0,1,2,3].map(j=>`
        <div class="optrow">
          <span class="dot" style="background:${COLORS[j]}">${SHAPES[j]}</span>
          <input type="text" maxlength="80" placeholder="Alternativa ${j+1}${j>=2?' (opcional)':''}" value="${esc(q.options[j]||'')}">
          <label><input type="radio" name="correct${i}" value="${j}" ${q.correct===j?'checked':''}> correta</label>
        </div>`).join('')}
      <div class="meta">Tempo para responder: <input class="dur" type="number" min="5" max="300" value="${q.duration||20}"> segundos</div>
    </div>`).join('') || '<div class="sub">Nenhuma pergunta ainda. Clique em "+ Adicionar pergunta".</div>';
}

function addQ(){ collect(); qs.push({text:'',options:['','','',''],correct:0,duration:20}); render(); window.scrollTo(0,document.body.scrollHeight); }
function delQ(i){ collect(); if(confirm('Excluir a pergunta '+(i+1)+'?')){ qs.splice(i,1); render(); } }
function move(i,d){ collect(); const j=i+d; if(j<0||j>=qs.length)return; [qs[i],qs[j]]=[qs[j],qs[i]]; render(); }

async function saveAll(){
  collect();
  // validação local
  for(let i=0;i<qs.length;i++){
    const q = qs[i];
    if(!q.text.trim()) return status('Pergunta '+(i+1)+': escreva o texto da pergunta.', false);
    const filled = q.options.map(o=>o.trim());
    const n = filled.filter(o=>o).length;
    if(n<2) return status('Pergunta '+(i+1)+': preencha pelo menos 2 alternativas.', false);
    if(q.correct<0 || !filled[q.correct]) return status('Pergunta '+(i+1)+': marque uma alternativa correta preenchida.', false);
    // remove alternativas vazias mantendo a correta apontando certo
    const map=[]; const opts=[];
    filled.forEach((o,j)=>{ if(o){ map[j]=opts.length; opts.push(o);} });
    q.options=opts; q.correct=map[q.correct];
  }
  if(!qs.length) return status('Adicione pelo menos 1 pergunta.', false);
  try{
    const r = await fetch('/api/questions',{method:'POST',headers:{'Content-Type':'application/json','x-pin':getPin()},body:JSON.stringify({questions:qs})});
    const d = await r.json();
    if(d.ok){
      localStorage.setItem('quiz_backup', JSON.stringify(qs)); // cópia de segurança neste navegador
      status('✅ '+d.count+' pergunta(s) salva(s) com sucesso!', true); render();
    }
    else if(d.pin){ localStorage.removeItem('quiz_pin'); status('PIN incorreto. Clique em Salvar de novo e informe o PIN.', false); }
    else status(d.error||'Erro ao salvar.', false);
  }catch(e){ status('Falha de conexão com o servidor.', false); }
}

function restoreBackup(){
  const bk = localStorage.getItem('quiz_backup');
  if(!bk) return status('Nenhum backup encontrado neste navegador.', false);
  qs = JSON.parse(bk).map(q=>({text:q.text,options:[...q.options,'','','',''].slice(0,4),correct:q.correct,duration:q.duration||20}));
  render();
  status('Backup restaurado ('+qs.length+' pergunta(s)). Confira e clique em "Salvar todas".', true);
}

async function resetGame(){
  if(!confirm('Reiniciar o jogo? As pontuações serão zeradas e o telão volta ao lobby.')) return;
  const r = await fetch('/api/game',{method:'POST',headers:{'Content-Type':'application/json','x-pin':getPin()},body:JSON.stringify({action:'reset'})});
  const d = await r.json();
  if(!d.ok && d.pin){ localStorage.removeItem('quiz_pin'); status('PIN incorreto. Tente novamente.', false); return; }
  status('Jogo reiniciado. O telão voltou ao lobby.', true);
}

/* ---------- Início ---------- */
fetch('/api/questions').then(r=>r.json()).then(d=>{
  qs = (d.questions||[]).map(q=>({text:q.text,options:[...q.options,'','','',''].slice(0,4),correct:q.correct,duration:q.duration||20}));
  render();
});
fetch('/api/info').then(r=>r.json()).then(d=>{
  document.getElementById('links').innerHTML =
    '<b>Telão (projetar):</b> ' + esc(d.hostUrl) + '<br>' +
    '<b>Jogadores (QR Code aparece no telão):</b> ' + esc(d.playerUrl);
});
</script>
</body>
</html>
