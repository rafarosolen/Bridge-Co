<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Quiz ao Vivo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;background:#46178f;min-height:100vh;color:#fff;transition:background .3s}
body.ok{background:#26890c}
body.bad{background:#c0392b}
#app{max-width:480px;margin:0 auto;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;padding:16px}
.center{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;gap:16px}
h1{font-size:1.7rem}
.sub{opacity:.85}
input[type=text]{width:100%;padding:15px;border:none;border-radius:10px;font-size:1.15rem;text-align:center;outline:none}
button.main{width:100%;padding:15px;border:none;border-radius:10px;font-size:1.15rem;font-weight:700;background:#111;color:#fff;cursor:pointer}
.badge{background:rgba(255,255,255,.16);padding:9px 18px;border-radius:999px;font-weight:600}
.top{display:flex;justify-content:space-between;align-items:center;font-weight:600;margin-bottom:8px;font-size:.95rem}
.qtext{font-size:1.15rem;font-weight:700;text-align:center;margin:6px 0 12px;word-break:break-word}
.timerbar{height:10px;background:rgba(255,255,255,.25);border-radius:5px;overflow:hidden;margin-bottom:12px}
.timerbar>div{height:100%;background:#ffd54a;width:100%}
.grid{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid.two{grid-template-columns:1fr}
.opt{border:none;border-radius:12px;color:#fff;font-weight:700;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:6px;cursor:pointer;min-height:110px;padding:10px}
.opt .shape{font-size:1.9rem;line-height:1}
.opt .txt{font-size:1rem;font-weight:600;word-break:break-word;text-align:center}
.opt:active{transform:scale(.97)}
.big{font-size:2.2rem;font-weight:800}
.pts{font-size:1.35rem;font-weight:700}
.total{opacity:.9}
.rankrow{width:100%;background:rgba(255,255,255,.14);border-radius:10px;padding:11px 16px;display:flex;justify-content:space-between;font-weight:600}
.medal{margin-right:8px}
.err{background:#c0392b;padding:10px 14px;border-radius:8px;font-weight:600}
</style>
</head>
<body>
<div id="app"></div>
<script>
const COLORS = ['#e21b3c','#1368ce','#d89e00','#26890c'];
const SHAPES = ['▲','◆','●','■']; // ▲ ◆ ● ■
const app = document.getElementById('app');

let playerId = localStorage.getItem('quiz_playerId') || '';
let playerName = localStorage.getItem('quiz_playerName') || '';
let es = null, lastKey = '', timerInt = null, deadline = 0;
let lastQIndex = -1, optimistic = false;

function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function setBg(cls){document.body.className = cls || ''}
function stopTimer(){if(timerInt){clearInterval(timerInt);timerInt=null}}

function startTimer(remaining, duration){
  stopTimer();
  deadline = Date.now() + remaining;
  timerInt = setInterval(()=>{
    const left = Math.max(0, deadline - Date.now());
    const bar = document.getElementById('tbar');
    const num = document.getElementById('tnum');
    if(bar) bar.style.width = (100*left/duration) + '%';
    if(num) num.textContent = Math.ceil(left/1000);
    if(left<=0) stopTimer();
  },100);
}

/* ---------- Tela de entrada ---------- */
function showJoin(msg){
  setBg(''); stopTimer(); lastKey='join';
  app.innerHTML = `<div class="center">
    <h1>🎉 Quiz ao Vivo</h1>
    <div class="sub">Digite seu nome para participar</div>
    ${msg?`<div class="err">${esc(msg)}</div>`:''}
    <input type="text" id="name" maxlength="20" placeholder="Seu nome" value="${esc(playerName)}" autocomplete="off">
    <button class="main" id="joinBtn">Entrar no jogo</button>
  </div>`;
  const inp = document.getElementById('name');
  document.getElementById('joinBtn').onclick = join;
  inp.addEventListener('keydown', e=>{ if(e.key==='Enter') join(); });
  inp.focus();
}

async function join(){
  const name = document.getElementById('name').value.trim();
  if(!name) return;
  try{
    const r = await fetch('/api/join',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name, playerId})});
    const d = await r.json();
    if(!d.ok){ showJoin(d.error||'Erro ao entrar'); return; }
    playerId = d.playerId; playerName = d.name;
    localStorage.setItem('quiz_playerId', playerId);
    localStorage.setItem('quiz_playerName', playerName);
    connect();
  }catch(e){ showJoin('Falha de conexão. Tente de novo.'); }
}

function connect(){
  if(es) es.close();
  es = new EventSource('/events?playerId='+encodeURIComponent(playerId));
  es.onmessage = e => render(JSON.parse(e.data));
}

/* ---------- Envio de resposta ---------- */
async function answer(i){
  optimistic = true;
  renderWaitingAnswer();
  try{
    await fetch('/api/answer',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({playerId, option:i})});
  }catch(e){ /* o servidor decide; o estado real chega pelo SSE */ }
}

function renderWaitingAnswer(){
  setBg('');
  app.innerHTML = `<div class="center">
    <div class="big">✔</div>
    <h1>Resposta enviada!</h1>
    <div class="sub">Aguardando os outros jogadores...</div>
  </div>`;
}

/* ---------- Renderização por estado ---------- */
function render(s){
  if(!s.you){ playerId=''; showJoin(); return; }

  if(s.state==='question' && s.question && s.question.index!==lastQIndex){
    lastQIndex = s.question.index; optimistic = false;
  }

  const key = [s.state, s.question?s.question.index:'', s.you.answered, s.you.lastCorrect, s.you.rank, optimistic].join('|');
  if(key===lastKey) return;
  lastKey = key;

  if(s.state==='lobby'){
    setBg(''); stopTimer();
    app.innerHTML = `<div class="center">
      <h1>Você está dentro, ${esc(s.you.name)}!</h1>
      <div class="badge">Aguardando o início do quiz...</div>
      <div class="sub">${s.playerCount} jogador(es) conectado(s)</div>
    </div>`;
    return;
  }

  if(s.state==='question'){
    if(s.you.answered || optimistic){ stopTimer(); renderWaitingAnswer(); return; }
    setBg('');
    const q = s.question;
    const twoCols = q.options.length>2 ? '' : ' two';
    app.innerHTML = `
      <div class="top"><span>Pergunta ${q.index+1}/${q.total}</span><span id="tnum">${Math.ceil(q.remaining/1000)}</span></div>
      <div class="timerbar"><div id="tbar"></div></div>
      <div class="qtext">${esc(q.text)}</div>
      <div class="grid${twoCols}">
        ${q.options.map((o,i)=>`<button class="opt" style="background:${COLORS[i]}" onclick="answer(${i})">
          <span class="shape">${SHAPES[i]}</span><span class="txt">${esc(o)}</span>
        </button>`).join('')}
      </div>`;
    startTimer(q.remaining, q.duration);
    return;
  }

  if(s.state==='reveal'){
    stopTimer();
    const y = s.you;
    if(y.lastOption===null || y.lastOption===undefined){
      setBg('bad');
      app.innerHTML = `<div class="center"><div class="big">⏰</div><h1>Tempo esgotado!</h1>
        <div class="total">Total: <b>${y.score}</b> pontos</div></div>`;
    } else if(y.lastCorrect){
      setBg('ok');
      app.innerHTML = `<div class="center"><div class="big">✅</div><h1>Acertou!</h1>
        <div class="pts">+${y.lastPoints} pontos</div>
        <div class="total">Total: <b>${y.score}</b> pontos</div></div>`;
    } else {
      setBg('bad');
      app.innerHTML = `<div class="center"><div class="big">❌</div><h1>Não foi dessa vez</h1>
        <div class="total">Total: <b>${y.score}</b> pontos</div></div>`;
    }
    return;
  }

  if(s.state==='ranking'){
    setBg(''); stopTimer();
    app.innerHTML = `<div class="center">
      <h1>Você está em ${s.you.rank}º lugar</h1>
      <div class="pts">${s.you.score} pontos</div>
      <div class="sub">Prepare-se para a próxima pergunta!</div>
    </div>`;
    return;
  }

  if(s.state==='final'){
    setBg(s.you.rank<=3?'ok':''); stopTimer();
    const medals = ['🥇','🥈','🥉'];
    const top3 = (s.ranking||[]).slice(0,3).map((r,i)=>
      `<div class="rankrow"><span><span class="medal">${medals[i]}</span>${esc(r.name)}</span><span>${r.score}</span></div>`).join('');
    app.innerHTML = `<div class="center">
      <h1>🏆 Fim de jogo!</h1>
      <div class="big">${s.you.rank}º lugar</div>
      <div class="pts">${s.you.score} pontos</div>
      ${top3}
    </div>`;
    return;
  }
}

/* ---------- Início ---------- */
if(playerId){
  // reconecta apenas se o jogador ainda existir no servidor; senão, mostra a tela de nome
  fetch('/api/join',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:playerName||'Jogador', playerId, rejoinOnly:true})})
    .then(r=>r.json())
    .then(d=>{ if(d.ok){ playerId=d.playerId; playerName=d.name; connect(); } else { playerId=''; showJoin(); } })
    .catch(()=>showJoin());
} else {
  showJoin();
}
</script>
</body>
</html>
